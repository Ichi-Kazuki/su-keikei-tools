  (function () {
    'use strict';

    const themes = {
      global: {
        label: '世界をつなぐビジネス',

        route: 'グローバルリーダー学修コース',
        lead: '国境を越える課題や多様な価値観に向き合い、世界で価値を生み出す学びと相性がよさそうです。',
        points: ['グローバル経済や国際比較経営史を学ぶ', 'GLOBEで実践的な英語力を磨く', '海外研修・留学も視野に入れる'],
        staffPrompt: '英語で学ぶ機会や海外研修について聞いてみよう。'
      },
      business: {
        label: 'アイデアを事業にする力',
        shortLabel: 'ビジネスデザイン',
        route: 'ビジネスデザイン学修コース',
        lead: '人や社会の「こうだったらいい」を、商品・サービス・組織の仕組みに変えていく力が光ります。',
        points: ['マーケティングや経営戦略を学ぶ', '組織マネジメント・ダイバーシティを探究', 'HLPのワークショップで課題解決を実践'],
        staffPrompt: '企業・地域の課題に取り組む授業やゼミの話を聞いてみよう。'
      },
      finance: {
        label: 'お金の流れから未来を読む力',
        shortLabel: '金融・財務',
        route: '金融・財務プロフェッショナル学修コース',
        lead: '数字の裏側にある社会や企業の動きを読み解き、意思決定を支える学びが似合いそうです。',
        points: ['会計学・財務管理論・金融論を学ぶ', '企業価値や資金の流れを考える', '簿記・FP・証券アナリストなどの学びへ'],
        staffPrompt: '資格学習と専門授業をどう両立できるか聞いてみよう。'
      },
      social: {
        label: '社会課題を、前に進める力',
        shortLabel: '政策・地域・SDGs',
        route: 'ビジネスデザイン学修コース',
        lead: '地域、環境、貧困・格差などの課題を、経済とビジネスの両方から解く学びがぴったりです。',
        points: ['ポリシー・デザインを通じて政策を考える', 'サステナビリティ＆地域共創を探究', '貧困・開発や気候変動の経済学に触れる'],
        staffPrompt: '地域・環境・国際協力をテーマにした学びを聞いてみよう。'
      },
      data: {
        label: 'データで次の一手を選ぶ力',
        shortLabel: 'データサイエンス',
        route: 'ビジネスデザイン学修コース',
        lead: '感覚だけに頼らず、データを手がかりに新しい商品・政策・仕組みを考える学びに向いています。',
        points: ['統計の基礎からデータ解析力を磨く', 'ソーシャル・データサイエンスを学ぶ', 'ビジネスや社会課題の解決に活かす'],
        staffPrompt: '高校までの数学経験に関わらず学べるか、具体的に聞いてみよう。'
      },
      leadership: {
        label: '人の力を引き出すリーダーシップ',
        shortLabel: 'リーダーシップ',
        route: 'ヒューマニスティック・リーダーシップ（HLP）',
        lead: '誰かを一方的に引っ張るよりも、互いの個性を活かしてチームで前に進む力を伸ばせそうです。',
        points: ['少人数の実践型ワークショップに挑戦', '地域・企業課題の解決に取り組む', '自分らしいリーダーシップを見つける'],
        staffPrompt: 'HLPで実際に取り組むテーマや雰囲気を聞いてみよう。'
      }
    };

    const questions = [
      {
        id: 'interest', type: 'multi', max: 2,
        title: '今、いちばん気になるテーマは？',
        helper: '「少し気になる」でも大丈夫。最大2つ選んでください。',
        choices: [
          ['global', '世界とつながる仕事', '海外・異文化・国際協力'],
          ['business', '新しい商品やサービス', '企画・起業・マーケティング'],
          ['finance', 'お金と企業のしくみ', '会計・投資・金融'],
          ['social', '社会や地域の課題', '環境・貧困・地方創生'],
          ['data', 'データで考えること', '統計・AI・分析'],
          ['leadership', '人やチームを動かすこと', '組織・対話・リーダーシップ']
        ]
      },
      {
        id: 'scene', type: 'single',
        title: 'どんな場面で「力になりたい」と思う？',
        helper: '直感で1つ選んでください。',
        choices: [
          ['business,leadership', '仲間とアイデアを形にするとき', '企画を立てて、みんなで実現したい'],
          ['social,global', '社会の困りごとに向き合うとき', '地域や世界の課題を前に進めたい'],
          ['finance,data', '複雑な情報から答えを見つけるとき', '数字や事実をもとに考えたい'],
          ['global,leadership', '違う考えの人と協力するとき', '多様な人と一緒に挑戦したい']
        ]
      },
      {
        id: 'method', type: 'single',
        title: '学び方として、わくわくするのは？',
        helper: '今の得意・不得意ではなく、これからやってみたい方を選んでください。',
        choices: [
          ['data,finance', '数字やデータを読み解く', '根拠を見つけて、納得できる答えを出したい'],
          ['business,social', '現場の声を聞いて解決策を考える', '人や地域のリアルを大切にしたい'],
          ['global,leadership', '対話や英語で視野を広げる', '違いを知り、新しい見方を得たい'],
          ['business,leadership', 'チームで試しながら学ぶ', '役割を分けて、一緒に完成させたい']
        ]
      },
      {
        id: 'future', type: 'single',
        title: '将来、どんな自分になっていたらうれしい？',
        helper: '職業が決まっていなくても大丈夫です。',
        choices: [
          ['global', '世界を舞台に働いている', '海外企業・国際協力・留学など'],
          ['business', '新しい価値を生み出している', '商品開発・企画・起業など'],
          ['finance', '組織の大事な判断を支えている', '会計・金融・経営管理など'],
          ['social', '誰かの暮らしを良くしている', '地域・環境・公共政策など'],
          ['data', '情報を活かして変化をつくっている', '分析・IT・マーケティングなど'],
          ['leadership', 'チームの可能性を広げている', '組織づくり・人材・プロジェクトなど']
        ]
      },
      {
        id: 'value', type: 'single',
        title: '大切にしたい価値観に近いのは？',
        helper: '正解はありません。今の気持ちに近いものを選んでください。',
        choices: [
          ['social,leadership', '人の幸せや、よりよい社会に役立ちたい', '自分だけでなく、周りの人にも目を向けたい'],
          ['global', '違いを楽しみ、視野を広げ続けたい', '新しい文化や考え方にふれて成長したい'],
          ['business', 'まずやってみて、形にしていきたい', 'アイデアを行動へ移したい'],
          ['finance,data', '事実に基づいて、よりよい選択をしたい', '数字や仕組みを味方につけたい']
        ]
      },
      {
        id: 'challenge', type: 'single',
        title: '大学で、最初に挑戦してみたいことは？',
        helper: 'まだ迷っている人は「人と協力」を選んでみてください。',
        choices: [
          ['leadership,business', '企業や地域の課題をチームで解決する', '実践型ワークショップに挑戦したい'],
          ['global', '英語で学び、海外にも目を向ける', '研修や留学にチャレンジしたい'],
          ['finance,data', '専門性を磨き、資格や分析力を身につける', '将来に役立つ武器をつくりたい'],
          ['social', '気候変動や地域などのテーマを深く探究する', '気になる社会課題を学びたい']
        ]
      }
    ];

    const state = { current: 0, answers: {}, resultIds: [] };
    const byId = function (id) { return document.getElementById(id); };
    const screens = ['welcome-screen', 'quiz-screen', 'result-screen'];

    function showOnly(screenId) {
      screens.forEach(function (id) { byId(id).classList.toggle('hidden', id !== screenId); });
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function startQuiz() {
      state.current = 0;
      state.answers = {};
      state.resultIds = [];
      showOnly('quiz-screen');
      renderQuestion();
    }

    function renderQuestion() {
      const question = questions[state.current];
      const answered = state.answers[question.id] || [];
      byId('progress-text').textContent = 'QUESTION ' + (state.current + 1) + ' / ' + questions.length;
      byId('progress-percent').textContent = Math.round(((state.current + 1) / questions.length) * 100) + '%';
      byId('progress-bar').style.width = ((state.current + 1) / questions.length) * 100 + '%';
      byId('back-button').style.visibility = state.current === 0 ? 'hidden' : 'visible';
      byId('next-button').textContent = state.current === questions.length - 1 ? '結果を見る →' : '次へ →';

      const choices = question.choices.map(function (choice) {
        const ids = choice[0].split(',');
        const selected = question.type === 'multi'
          ? ids.some(function (id) { return answered.indexOf(id) > -1; })
          : answered.join(',') === choice[0];
        return '<button class="choice" type="button" data-value="' + choice[0] + '" aria-pressed="' + selected + '"><strong>' + choice[1] + '</strong><small>' + choice[2] + '</small></button>';
      }).join('');

      byId('question-card').innerHTML =
        '<div class="question-number">0' + (state.current + 1) + '</div>' +
        '<h2>' + question.title + '</h2>' +
        '<p class="question-helper">' + question.helper + '</p>' +
        '<div class="choice-list">' + choices + '</div>' +
        '<p id="selection-hint" class="selection-hint"></p>';

      document.querySelectorAll('.choice').forEach(function (button) {
        button.addEventListener('click', function () { selectChoice(question, button.dataset.value); });
      });
    }

    function selectChoice(question, value) {
      if (question.type === 'single') {
        state.answers[question.id] = value.split(',');
      } else {
        const selected = state.answers[question.id] || [];
        const optionIds = value.split(',');
        const isSelected = optionIds.some(function (id) { return selected.indexOf(id) > -1; });
        if (isSelected) {
          state.answers[question.id] = selected.filter(function (id) { return optionIds.indexOf(id) === -1; });
        } else if (selected.length >= question.max) {
          byId('selection-hint').textContent = '最大' + question.max + 'つまで選べます。選択を外してから選び直してください。';
          return;
        } else {
          state.answers[question.id] = selected.concat(optionIds);
        }
      }
      renderQuestion();
    }

    function nextQuestion() {
      const question = questions[state.current];
      const selection = state.answers[question.id] || [];
      if (!selection.length) {
        byId('selection-hint').textContent = '1つ以上選んでください。';
        return;
      }
      if (state.current < questions.length - 1) {
        state.current += 1;
        renderQuestion();
      } else {
        showResult();
      }
    }

    function getRankedThemes() {
      const score = {};
      Object.keys(themes).forEach(function (id) { score[id] = 0; });
      questions.forEach(function (question) {
        (state.answers[question.id] || []).forEach(function (id) { score[id] += question.id === 'interest' ? 3 : 1; });
      });
      const interestOrder = state.answers.interest || [];
      return Object.keys(score).sort(function (a, b) {
        if (score[b] !== score[a]) return score[b] - score[a];
        const aInterest = interestOrder.indexOf(a);
        const bInterest = interestOrder.indexOf(b);
        if (aInterest !== bInterest) return (aInterest === -1 ? 99 : aInterest) - (bInterest === -1 ? 99 : bInterest);
        return a.localeCompare(b, 'ja');
      });
    }

    function makeCard(id, isPrimary) {
      const theme = themes[id];
      return '<article class="result-card ' + (isPrimary ? 'primary' : '') + '">' +
        '<span class="tag">' + (isPrimary ? 'あなたのメインテーマ' : 'もう一つの可能性') + '</span>' +
        '<h3>' + theme.label + '</h3>' +
        '<p><strong>' + theme.route + '</strong></p>' +
        '<p>' + theme.lead + '</p>' +
        '<ul>' + theme.points.map(function (point) { return '<li>' + point + '</li>'; }).join('') + '</ul>' +
        '</article>';
    }

    function showResult() {
      state.resultIds = getRankedThemes().slice(0, 2);
      const primary = themes[state.resultIds[0]];
      byId('result-title').textContent = '「' + primary.shortLabel + '」から、未来をひらく。';
      byId('result-lead').textContent = primary.lead + ' そして、' + themes[state.resultIds[1]].shortLabel + 'の視点を組み合わせると、あなただけの学び方がさらに広がります。';
      byId('result-cards').innerHTML = makeCard(state.resultIds[0], true) + makeCard(state.resultIds[1], false);
      showOnly('result-screen');
    }

    byId('start-button').addEventListener('click', startQuiz);
    byId('brand-home').addEventListener('click', function (event) {
      event.preventDefault();
      showOnly('welcome-screen');
    });
    byId('next-button').addEventListener('click', nextQuestion);
    byId('back-button').addEventListener('click', function () { state.current -= 1; renderQuestion(); });
    byId('restart-button').addEventListener('click', startQuiz);
    byId('print-button').addEventListener('click', function () { window.print(); });
  }());
</script>
